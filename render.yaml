services:
  - type: web
    name: max-openai-render-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: MAX_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: OPENAI_API_BASE
        value: https://api.openai.com/v1
      - key: MAX_WEBHOOK_SECRET
        sync: false
      - key: MAX_API_BASE
        value: https://platform-api.max.ru
